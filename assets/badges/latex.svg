  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="23.5" y="15" fill="#010101" fill-opacity=".3">LaTeX</text>
    <text x="23.5" y="14">LaTeX</text>
    <text x="92.0" y="15" fill="#010101" fill-opacity=".3">article report</text>
