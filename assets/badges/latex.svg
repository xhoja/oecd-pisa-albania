<svg xmlns="http://www.w3.org/2000/svg" width="137" height="20" role="img" aria-label="LaTeX: article report">
  <title>LaTeX: article report</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="137" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
