random_seed: 42
project_name: "oecd-pisa-albania"
version: "1.0.0"

targets:
  primary: "AT_RISK_MATH"
  secondary: ["AT_RISK_READ", "AT_RISK_SCIE"]
  multilabel: "AT_RISK_ANY"

experiments:
  - name: "albania_2022_deep_dive"
    country: "ALB"
    cycle: 2022
    features: "extended"
    description: "Main experiment — Albania 2022, full extended feature set"

  - name: "albania_longitudinal"
    country: "ALB"
    cycles: [2009, 2012, 2015, 2018, 2022]
    features: "core"
    description: "Longitudinal — Albania all cycles, core features only"

  - name: "comparative_2022"
    countries: ["ALB", "MKD", "MNE", "SRB", "BGR", "EST", "FIN", "MEX", "COL"]
    cycle: 2022
    features: "core"
    description: "Cross-country comparison using 2022 full SAV"

  - name: "comparative_2018"
    countries: ["ALB", "MKD", "MNE", "SRB", "BGR", "EST", "FIN", "MEX", "COL"]
    cycle: 2018
    features: "core"
    description: "Cross-country comparison using 2018 full SAV"

  - name: "covariate_shift"
    country: "ALB"
    train_cycles: [2009, 2012, 2015, 2018]
    test_cycle: 2022
    features: "core"
    description: "OOS experiment — train on pre-2022, test on 2022"

fairness:
  protected_attributes: ["GENDER", "SES_QUINTILE", "URBAN_RURAL", "IMMIG"]
  threshold_range: [0.3, 0.4, 0.5, 0.6, 0.7]
  metrics: ["demographic_parity", "equal_opportunity", "equalized_odds", "calibration_by_group"]

logging:
  level: "INFO"
  format: "json"
  file: "outputs/experiment.log"

reproducibility:
  set_global_seeds: true
  joblib_parallel_backend: "loky"
  numpy_seed: 42
  python_seed: 42
