# Model registry - hyperparameter spaces for Optuna

cv:
  outer_folds: 5
  outer_repeats: 10
  inner_folds: 5
  optuna_trials: 100       # per model
  optuna_timeout_sec: 3600 # 1h max per model
  bootstrap_samples: 2000
  random_state: 42

models:
  logistic_regression:
    enabled: true
    class: "sklearn.linear_model.LogisticRegression"
    fixed:
      max_iter: 2000
      class_weight: "balanced"
      random_state: 42
    search_space:
      # sklearn 1.8 deprecated `penalty`; l1_ratio in [0,1] subsumes l2(0)/l1(1)/
      # elasticnet(between). saga required for l1_ratio. No FutureWarning.
      C: {type: float, low: 0.001, high: 100, log: true}
      l1_ratio: {type: float, low: 0.0, high: 1.0}
      solver: {type: categorical, choices: ["saga"]}

  decision_tree:
    enabled: true
    class: "sklearn.tree.DecisionTreeClassifier"
    fixed:
      class_weight: "balanced"
      random_state: 42
    search_space:
      max_depth: {type: int, low: 3, high: 15}
      min_samples_leaf: {type: int, low: 5, high: 100}
      min_samples_split: {type: int, low: 10, high: 100}
      criterion: {type: categorical, choices: ["gini", "entropy"]}

  random_forest:
    enabled: true
    class: "sklearn.ensemble.RandomForestClassifier"
    fixed:
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
    search_space:
      n_estimators: {type: int, low: 100, high: 600}
      max_depth: {type: int, low: 5, high: 30}
      min_samples_leaf: {type: int, low: 1, high: 20}
      max_features: {type: categorical, choices: ["sqrt", "log2", 0.3, 0.5]}
      bootstrap: {type: categorical, choices: [true, false]}

  extra_trees:
    enabled: true
    class: "sklearn.ensemble.ExtraTreesClassifier"
    fixed:
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
    search_space:
      n_estimators: {type: int, low: 100, high: 600}
      max_depth: {type: int, low: 5, high: 30}
      min_samples_leaf: {type: int, low: 1, high: 20}
      max_features: {type: categorical, choices: ["sqrt", "log2", 0.3, 0.5]}

  xgboost:
    enabled: true
    class: "xgboost.XGBClassifier"
    fixed:
      use_label_encoder: false
      eval_metric: "logloss"
      random_state: 42
      n_jobs: -1
    search_space:
      n_estimators: {type: int, low: 100, high: 1000}
      learning_rate: {type: float, low: 0.005, high: 0.3, log: true}
      max_depth: {type: int, low: 3, high: 10}
      subsample: {type: float, low: 0.5, high: 1.0}
      colsample_bytree: {type: float, low: 0.5, high: 1.0}
      reg_alpha: {type: float, low: 1e-8, high: 10.0, log: true}
      reg_lambda: {type: float, low: 1e-8, high: 10.0, log: true}
      gamma: {type: float, low: 0.0, high: 5.0}
      scale_pos_weight: {type: float, low: 0.5, high: 5.0}  # handles imbalance

  lightgbm:
    enabled: true
    class: "lightgbm.LGBMClassifier"
    fixed:
      random_state: 42
      n_jobs: -1
      verbose: -1
      class_weight: "balanced"
    search_space:
      n_estimators: {type: int, low: 100, high: 1000}
      learning_rate: {type: float, low: 0.005, high: 0.3, log: true}
      num_leaves: {type: int, low: 20, high: 300}
      min_child_samples: {type: int, low: 5, high: 100}
      feature_fraction: {type: float, low: 0.5, high: 1.0}
      bagging_fraction: {type: float, low: 0.5, high: 1.0}
      bagging_freq: {type: int, low: 1, high: 7}
      reg_alpha: {type: float, low: 1e-8, high: 10.0, log: true}
      reg_lambda: {type: float, low: 1e-8, high: 10.0, log: true}

  catboost:
    enabled: true
    class: "catboost.CatBoostClassifier"
    fixed:
      random_seed: 42
      verbose: 0
      auto_class_weights: "Balanced"
      eval_metric: "AUC"
    search_space:
      iterations: {type: int, low: 100, high: 1000}
      learning_rate: {type: float, low: 0.005, high: 0.3, log: true}
      depth: {type: int, low: 4, high: 10}
      l2_leaf_reg: {type: float, low: 1.0, high: 10.0}
      border_count: {type: int, low: 32, high: 254}
      bagging_temperature: {type: float, low: 0.0, high: 1.0}

  svm:
    enabled: true
    class: "sklearn.svm.SVC"
    fixed:
      class_weight: "balanced"
      probability: true
      random_state: 42
      cache_size: 2000
    search_space:
      C: {type: float, low: 0.01, high: 100, log: true}
      kernel: {type: categorical, choices: ["rbf", "poly"]}
      gamma: {type: categorical, choices: ["scale", "auto"]}

  knn:
    enabled: true
    class: "sklearn.neighbors.KNeighborsClassifier"
    fixed:
      n_jobs: -1
    search_space:
      n_neighbors: {type: int, low: 5, high: 51}
      weights: {type: categorical, choices: ["uniform", "distance"]}
      metric: {type: categorical, choices: ["euclidean", "manhattan", "minkowski"]}

  mlp:
    enabled: true
    class: "sklearn.neural_network.MLPClassifier"
    fixed:
      max_iter: 500
      random_state: 42
      early_stopping: true
      validation_fraction: 0.1
    search_space:
      hidden_layer_sizes_n_layers: {type: int, low: 1, high: 4}
      hidden_layer_sizes_units: {type: int, low: 32, high: 256}
      alpha: {type: float, low: 1e-5, high: 0.1, log: true}
      learning_rate_init: {type: float, low: 1e-4, high: 0.01, log: true}
      activation: {type: categorical, choices: ["relu", "tanh"]}

  gradient_boosting:
    enabled: true
    class: "sklearn.ensemble.GradientBoostingClassifier"
    fixed:
      random_state: 42
    search_space:
      n_estimators: {type: int, low: 100, high: 500}
      learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
      max_depth: {type: int, low: 3, high: 8}
      subsample: {type: float, low: 0.5, high: 1.0}
      min_samples_leaf: {type: int, low: 5, high: 50}

# Stacking ensemble (uses top-3 base models as level-0)
stacking:
  enabled: true
  level_0: ["xgboost", "lightgbm", "catboost"]
  meta_learner: "logistic_regression"
  cv_folds: 5
  passthrough: false

# Calibration
calibration:
  methods: ["sigmoid", "isotonic"]
  cv_folds: 5
